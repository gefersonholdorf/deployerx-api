name: "Deploy DeployerX API Development"

on:
  push:
    branches:
      - main

jobs:
  build:
    name: "Build and Push"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v3

      - name: "Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'npm'

      - name: Deploy
        run: |
            docker build -t deployerx-api:latest .